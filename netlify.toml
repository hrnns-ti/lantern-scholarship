[build]
command = "npm run build"
publish = "dist"

[dev]
command = "npm run dev"
targetPort = 5173
port = 8888

# ===== Ledger (IDOR via query) =====
[[redirects]]
from = "/ledger"
to = "/ledger/1.html"
status = 200
force = true
query = { id = "1" }

[[redirects]]
from = "/ledger"
to = "/ledger/2.html"
status = 200
force = true
query = { id = "2" }

[[redirects]]
from = "/ledger"
to = "/ledger/3.html"
status = 200
force = true
query = { id = "3" }

[[redirects]]
from = "/ledger"
to = "/ledger/4.html"
status = 200
force = true
query = { id = "4" }

[[redirects]]
from = "/ledger"
to = "/ledger/notfound.html"
status = 404
force = true

# ===== Ops (Recon) =====
[[redirects]]
from = "/ops"
to = "/ops/index.html"
status = 200
force = true

[[redirects]]
from = "/ops/"
to = "/ops/index.html"
status = 200
force = true

# ===== SPA fallback (kalau pakai React Router) =====
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# ===== Caching (reduce revalidation / 304 spam) =====

# favicon: cache setahun (browser nggak bolak-balik cek)
[[headers]]
for = "/favicon.ico"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# assets hasil build vite: cache setahun
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# robots & ops: cache 10 menit (cukup aman)
[[headers]]
for = "/robots.txt"
[headers.values]
Cache-Control = "public, max-age=4800"

[[headers]]
for = "/ops/*"
[headers.values]
Cache-Control = "public, max-age=4800"

[[headers]]
for = "/ledger/*.html"
[headers.values]
Cache-Control = "public, max-age=4800"